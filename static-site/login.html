<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 — DERKERK</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="login">
    <div id="site-header"></div>

    <main class="main auth-layout">
      <div class="auth-card">
        <p class="kicker">Member</p>
        <h1 class="page-title" style="margin-bottom: 0">로그인</h1>
        <p class="muted" style="margin-top: 8px">
          이메일로 인증코드를 받은 뒤 6자리 코드를 입력하세요. (데모: 코드는 화면에도 표시되며, 메일 앱으로 본문 전송을 시도합니다.)
        </p>

        <div id="login-step-email" class="form-stack" style="margin-top: 20px">
          <div>
            <label class="label" for="login-email">이메일</label>
            <input class="input" id="login-email" type="email" autocomplete="email" required />
          </div>
          <button type="button" class="btn btn-primary" style="width: 100%" id="login-send-code">
            인증코드 받기
          </button>
        </div>

        <form id="login-form" class="form-stack" hidden style="margin-top: 20px">
          <p class="muted" style="margin: 0; font-size: 14px; line-height: 1.5">
            메일함(또는 아래 데모 박스)에서 6자리 코드를 확인한 뒤 입력하세요.
          </p>
          <div id="login-demo-code" class="auth-code-demo" hidden>
            <span class="auth-code-demo__label">데모 표시 · 인증코드</span>
            <strong id="login-demo-code-value" class="auth-code-demo__value"></strong>
          </div>
          <div>
            <label class="label" for="login-code">인증코드</label>
            <input
              class="input auth-code-input"
              id="login-code"
              inputmode="numeric"
              autocomplete="one-time-code"
              maxlength="8"
              placeholder="6자리"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">로그인</button>
          <button type="button" class="link-btn" style="width: 100%; text-align: center" id="login-change-email">
            이메일 변경
          </button>
        </form>

        <p class="auth-forgot-wrap">
          <span class="muted" style="font-size: 13px">비밀번호 없이 이메일 인증만 사용합니다.</span>
        </p>

        <p class="form-footer">
          계정이 없으신가요?
          <a href="./register.html">회원가입</a>
        </p>
      </div>
    </main>

    <div id="site-footer"></div>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
