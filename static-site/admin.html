<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 — DERKERK</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="admin">
    <div id="site-header"></div>

    <main class="main container" style="padding-top: 28px; padding-bottom: 64px">
      <div style="display: flex; align-items: end; justify-content: space-between; gap: 16px; flex-wrap: wrap">
        <div>
          <h1 class="page-title" style="margin-bottom: 8px">관리자</h1>
          <p class="muted" style="margin: 0">배너 · 재고 · 상품관리 · 주문관리 (정적 데모)</p>
        </div>
        <a class="link-arrow" href="./account.html" style="text-decoration: none">내 계정 →</a>
      </div>

      <div style="display: grid; grid-template-columns: 240px 1fr; gap: 24px; margin-top: 24px">
        <aside style="border: 1px solid rgba(255,255,255,0.14); border-radius: 20px; background: rgba(255,255,255,0.02); padding: 16px">
          <div class="kicker" style="margin-bottom: 12px">탭</div>
          <div style="display: flex; flex-direction: column; gap: 10px">
            <button type="button" class="btn btn-ghost btn-sm admin-tab-btn" data-tab="banner">배너</button>
            <button type="button" class="btn btn-ghost btn-sm admin-tab-btn" data-tab="inventory">재고</button>
            <button type="button" class="btn btn-ghost btn-sm admin-tab-btn" data-tab="products">상품관리</button>
            <button type="button" class="btn btn-ghost btn-sm admin-tab-btn" data-tab="orders">주문관리</button>
          </div>
        </aside>

        <section style="border: 1px solid rgba(255,255,255,0.14); border-radius: 20px; background: rgba(255,255,255,0.02); padding: 16px">
          <div id="admin-banner" class="admin-tab" hidden></div>
          <div id="admin-inventory" class="admin-tab" hidden></div>
          <div id="admin-products" class="admin-tab" hidden></div>
          <div id="admin-orders" class="admin-tab" hidden></div>
          <div id="admin-unauthorized" class="admin-tab" hidden>
            <p class="muted" style="margin: 0 0 16px">관리자 권한이 필요합니다.</p>
            <a class="btn btn-primary" href="./login.html">로그인</a>
          </div>
        </section>
      </div>
    </main>

    <div id="site-footer"></div>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
