<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 — DERKERK</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="register">
    <div id="site-header"></div>

    <main class="main auth-layout">
      <div class="auth-card">
        <p class="kicker">Member</p>
        <h1 class="page-title" style="margin-bottom: 0">회원가입</h1>
        <p class="muted" style="margin-top: 8px">
          이메일과 인증코드만으로 가입합니다. 전화번호는 필요 없습니다. 정보는 이 브라우저에만 저장되는 데모입니다.
        </p>

        <div id="reg-step-email" class="form-stack" style="margin-top: 20px">
          <div>
            <label class="label" for="reg-email">이메일</label>
            <input class="input" id="reg-email" type="email" autocomplete="email" required />
          </div>
          <button type="button" class="btn btn-primary" style="width: 100%" id="reg-send-code">
            인증코드 받기
          </button>
        </div>

        <form id="register-form" class="form-stack" hidden style="margin-top: 20px">
          <div id="reg-demo-code" class="auth-code-demo" hidden>
            <span class="auth-code-demo__label">데모 표시 · 인증코드</span>
            <strong id="reg-demo-code-value" class="auth-code-demo__value"></strong>
          </div>
          <div>
            <label class="label" for="reg-code">인증코드</label>
            <input
              class="input auth-code-input"
              id="reg-code"
              inputmode="numeric"
              autocomplete="one-time-code"
              maxlength="8"
              placeholder="6자리"
              required
            />
          </div>
          <div>
            <label class="label" for="reg-name">닉네임 (선택)</label>
            <input class="input" id="reg-name" autocomplete="nickname" />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">가입 완료</button>
          <button type="button" class="link-btn" style="width: 100%; text-align: center" id="reg-change-email">
            이메일 변경
          </button>
        </form>

        <p class="form-footer">
          이미 계정이 있나요?
          <a href="./login.html">로그인</a>
        </p>
      </div>
    </main>

    <div id="site-footer"></div>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
