<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 — DERKERK</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="cart">
    <div id="site-header"></div>

    <main class="main container cart-layout">
      <div>
        <h1 class="page-title">장바구니</h1>
        <p class="muted">수량 변경 시 자동 저장됩니다.</p>

        <div id="cart-empty" class="empty-state" style="margin-top: 24px" hidden>
          장바구니가 비어 있습니다.
          <div style="margin-top: 20px">
            <a class="btn btn-primary" href="./shop.html">쇼핑하러 가기</a>
          </div>
        </div>

        <div class="table-wrap" style="margin-top: 24px">
          <table class="data-table">
            <thead>
              <tr>
                <th>상품</th>
                <th>컬러</th>
                <th>사이즈</th>
                <th>가격</th>
                <th>수량</th>
                <th>소계</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cart-tbody"></tbody>
          </table>
        </div>
      </div>

      <aside id="cart-aside" class="cart-aside" hidden>
        <p class="kicker">주문 요약</p>
        <div class="row-total">
          <span>소계</span>
          <span id="cart-subtotal">₩0</span>
        </div>
        <button type="button" class="btn btn-primary" id="cart-checkout-btn" style="width: 100%; margin-top: 20px">
          결제 진행
        </button>
        <p class="muted" style="margin-top: 16px; font-size: 13px">
          데모 결제는 주문만 로컬에 저장됩니다. 실제 토스 연동은 서버가 필요합니다.
        </p>
      </aside>
    </main>

    <div id="site-footer"></div>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
