<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DERKERK — Product</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-inner">
        <a class="brand" href="./index.html">DERKERK</a>
        <nav class="nav">
          <a href="./index.html">Shop</a>
          <a href="./cart.html">Cart</a>
        </nav>
      </div>
    </header>

    <main class="container section">
      <div style="display: grid; grid-template-columns: 1fr; gap: 16px">
        <div class="card card-pad">
          <div
            style="
              aspect-ratio: 1/1;
              border-radius: 18px;
              border: 1px solid var(--border);
              background: #000;
              display: flex;
              align-items: center;
              justify-content: center;
              text-align: center;
            "
          >
            <div>
              <div class="kicker">DERKERK</div>
              <div style="margin-top: 10px; font-size: 26px; font-weight: 650">MONO TEE</div>
            </div>
          </div>
        </div>

        <div class="card card-pad">
          <div class="kicker">PRODUCT</div>
          <h1 class="h1" style="font-size: 32px">MONO TEE</h1>
          <p class="p">
            A crisp black tee with a sharp silhouette. Minimal, durable, and cut for daily wear.
          </p>

          <div style="margin-top: 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px">
            <div style="font-size: 20px; font-weight: 650">₩29,000</div>
            <a class="btn" href="./cart.html">Add to cart</a>
          </div>

          <div style="margin-top: 34px; display: grid; grid-template-columns: 1fr; gap: 12px">
            <div class="card" style="padding: 16px">
              <div style="color: rgba(255, 255, 255, 0.85); font-size: 12px; font-weight: 650">
                Shipping
              </div>
              <div class="small" style="margin-top: 8px">KR only · 1–3 days</div>
            </div>
            <div class="card" style="padding: 16px">
              <div style="color: rgba(255, 255, 255, 0.85); font-size: 12px; font-weight: 650">
                Returns
              </div>
              <div class="small" style="margin-top: 8px">7 days · unused</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <div>© 2026 DERKERK</div>
        <div>Black / White two-tone commerce.</div>
      </div>
    </footer>
  </body>
</html>
